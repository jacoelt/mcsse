services:
  - type: web
    name: mcsse-api
    runtime: python
    plan: free
    buildCommand: |
      cd back && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: cd back && gunicorn main.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FETCH_API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.3"

  - type: web
    name: mcsse-front
    runtime: static
    plan: free
    buildCommand: cd front && npm install && npx vite build
    staticPublishPath: front/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
